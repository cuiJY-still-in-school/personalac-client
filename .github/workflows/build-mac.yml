name: Build Mac Client

on:
  push:
    branches: [main]
    paths:
      - 'student/**'
      - 'common/**'
      - 'student.py'
      - 'build.py'
      - 'requirements.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller>=6.0.0
          pip install PyQt6>=6.6.0 PyQt6-WebEngine>=6.6.0 psutil requests

      - name: Build Mac DMG
        run: python build.py mac

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mac-latest
          name: "PersonalAC for Mac (latest)"
          body: "macOS 客户端，自动构建。下载后双击 DMG，将 PersonalAC 拖入应用程序文件夹。"
          prerelease: false
          files: dist/personalac-student-mac.dmg
